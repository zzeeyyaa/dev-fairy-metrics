name: Dev Fairy Metrics Update

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history to push changes back
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: node generate.mjs

      - name: Commit and Push SVGs to Output Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and switch to output branch
          git checkout -B output
          
          # Force add files in case output/ is gitignored
          git add -f output/github-stats.svg output/github-top-langs.svg
          
          # Commit and push
          git commit -m "✨ Update Dev Fairy SVG metrics [skip ci]" || echo "No changes to commit"
          git push origin output --force
