
<svg xmlns="http://www.w3.org/2000/svg" width="490" height="164" viewBox="0 0 490 164">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c081a"/>
      <stop offset="100%" stop-color="#050308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#80deea" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.02"/>
    </linearGradient>

    <filter id="blob-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <clipPath id="card-clip">
      <rect width="490" height="164" rx="20"/>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&amp;family=Outfit:wght@600;700;800;900&amp;display=swap');
      
      .title-text { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; fill: #f48fb1; letter-spacing: 1.5px; }
      .user-text { font-family: 'Outfit', sans-serif; font-size: 10.5px; font-weight: 600; fill: #b3afc9; opacity: 0.8; }
      .lang-label { font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.3px; fill: #f48fb1; }
      .lang-pct { font-family: 'Outfit', sans-serif; font-size: 10.5px; font-weight: 900; fill: #b3afc9; opacity: 0.8; }
      .footer-text { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700; fill: #b3afc9; opacity: 0.4; letter-spacing: 2px; }
    </style>
  </defs>

  <rect x="10" y="10" width="470" height="144" rx="20" fill="url(#bg)" 
    stroke="url(#accent)" stroke-width="1.2" stroke-opacity="0.6"/>

  <g clip-path="url(#card-clip)">
    <circle cx="60" cy="124" r="65" fill="#80deea" opacity="0.22" filter="url(#blob-blur)"/>
    <circle cx="430" cy="40" r="75" fill="#ce93d8" opacity="0.18" filter="url(#blob-blur)"/>
  </g>

  <rect x="10" y="10" width="470" height="144" rx="20" fill="url(#shimmer)" pointer-events="none"/>

  
  <g transform="translate(28, 32)">
    <text class="title-text" x="0" y="0">✨ ELEMENT COMPOSITION</text>
    <text class="user-text" x="0" y="14">Compact mastery breakdown for @zzeeyyaa</text>
  </g>
  

  <g transform="translate(28 58)">
    <rect width="434" height="12" rx="6" fill="#271c35" opacity="0.15"/>
    
    <g clip-path="url(#card-clip)">
      
      <rect x="0" y="0" width="0" height="12" fill="#00B4AB" rx="6">
        <animate attributeName="width" from="0" to="184.016" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
      <rect x="184.016" y="0" width="0" height="12" fill="#DA5B0B" rx="0">
        <animate attributeName="width" from="0" to="85.49799999999999" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
      <rect x="269.514" y="0" width="0" height="12" fill="#f7df1e" rx="0">
        <animate attributeName="width" from="0" to="32.55" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
      <rect x="302.064" y="0" width="0" height="12" fill="#3178c6" rx="0">
        <animate attributeName="width" from="0" to="31.248000000000005" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
      <rect x="333.312" y="0" width="0" height="12" fill="#f34b7d" rx="0">
        <animate attributeName="width" from="0" to="22.134" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
      <rect x="355.446" y="0" width="0" height="12" fill="hsl(329, 65%, 55%)" rx="0">
        <animate attributeName="width" from="0" to="18.662" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>
  </g>

  <g transform="translate(0, 0)">
    
    <g transform="translate(28 94)">
      <circle cx="4" cy="5" r="3.5" fill="#00B4AB" opacity="0.95"/>
      
      <text x="14" y="5" class="lang-label" dominant-baseline="central">
        DART 
        <tspan class="lang-pct"> 42.4%</tspan>
      </text>
    </g>
    <g transform="translate(172 94)">
      <circle cx="4" cy="5" r="3.5" fill="#DA5B0B" opacity="0.95"/>
      
      <text x="14" y="5" class="lang-label" dominant-baseline="central">
        JUPYTER .. 
        <tspan class="lang-pct"> 19.7%</tspan>
      </text>
    </g>
    <g transform="translate(316 94)">
      <circle cx="4" cy="5" r="3.5" fill="#f7df1e" opacity="0.95"/>
      
      <text x="14" y="5" class="lang-label" dominant-baseline="central">
        JAVASCRIPT 
        <tspan class="lang-pct"> 7.5%</tspan>
      </text>
    </g>
    <g transform="translate(28 118)">
      <circle cx="4" cy="5" r="3.5" fill="#3178c6" opacity="0.95"/>
      
      <text x="14" y="5" class="lang-label" dominant-baseline="central">
        TYPESCRIPT 
        <tspan class="lang-pct"> 7.2%</tspan>
      </text>
    </g>
    <g transform="translate(172 118)">
      <circle cx="4" cy="5" r="3.5" fill="#f34b7d" opacity="0.95"/>
      
      <text x="14" y="5" class="lang-label" dominant-baseline="central">
        C++ 
        <tspan class="lang-pct"> 5.1%</tspan>
      </text>
    </g>
    <g transform="translate(316 118)">
      <circle cx="4" cy="5" r="3.5" fill="hsl(329, 65%, 55%)" opacity="0.95"/>
      
      <text x="14" y="5" class="lang-label" dominant-baseline="central">
        CMAKE 
        <tspan class="lang-pct"> 4.3%</tspan>
      </text>
    </g>
  </g>

  <text class="footer-text" x="462" y="150" text-anchor="end">DEV FAIRY METRICS</text>
</svg>