
<svg xmlns="http://www.w3.org/2000/svg" width="490" height="190" viewBox="0 0 490 190">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c081a"/>
      <stop offset="100%" stop-color="#050308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#80deea" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.02"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blob-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <clipPath id="card-clip">
      <rect width="490" height="190" rx="20"/>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&amp;family=Outfit:wght@600;700;800;900&amp;display=swap');
      
      .name-text { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; fill: #f48fb1; letter-spacing: 0.5px; }
      .user-text { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; fill: #b3afc9; opacity: 0.8; }
      .lvl-number { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 900; fill: #ffffff; }
      .role-badge-text { font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 800; fill: #ce93d8; letter-spacing: 1px; }
      .pill-text { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; fill: #b3afc9; }
      .pill-val { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 800; fill: #f48fb1; }
      .exp-label { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900; fill: #b3afc9; }
      .footer-text { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700; fill: #b3afc9; opacity: 0.4; letter-spacing: 2px; }
    </style>
  </defs>

  <rect x="10" y="10" width="470" height="170" rx="20" fill="url(#bg)" 
    stroke="url(#accent)" stroke-width="1.2" stroke-opacity="0.6"/>

  <g transform="translate(10, 10)" clip-path="url(#card-clip)">
    <circle cx="110" cy="110" r="75" fill="#80deea" opacity="0.22" filter="url(#blob-blur)"/>
    <circle cx="370" cy="40" r="95" fill="#ce93d8" opacity="0.18" filter="url(#blob-blur)"/>
  </g>

  <rect x="10" y="10" width="470" height="170" rx="20" fill="url(#shimmer)" pointer-events="none"/>

  <g transform="translate(85, 75)">
    <text x="-40" y="-35" font-size="14" opacity="0.6">✨</text>
    <text x="35" y="45" font-size="12" opacity="0.5">🌟</text>

    <rect x="-38" y="-38" width="76" height="76" rx="20" fill="#ce93d8" opacity="0.22"/>
    
    <rect x="-32" y="-32" width="64" height="64" rx="16" fill="url(#accent)" filter="url(#glow)"/>
    <text class="lvl-number" x="0" y="2" text-anchor="middle" dominant-baseline="central">Lv.4</text>

    <rect x="-60" y="44" width="120" height="24" rx="12" fill="url(#bg)" stroke="url(#accent)" stroke-width="1.5"/>
    <text class="role-badge-text" x="0" y="56" text-anchor="middle" dominant-baseline="central">Dart Fairy</text>
  </g>

  <g transform="translate(195, 45)">
    
    <text class="name-text" x="0" y="0">지아</text>
    <text class="user-text" x="0" y="18">@zzeeyyaa</text>

    <g transform="translate(0, 35)">
      <rect x="0" y="0" width="82" height="26" rx="8" fill="#ce93d8" opacity="0.25"/>
      <text class="pill-text" x="6" y="13" dominant-baseline="central">⭐ Stars</text>
      <text class="pill-val" x="76" y="13" text-anchor="end" dominant-baseline="central">0</text>

      <rect x="88" y="0" width="82" height="26" rx="8" fill="#80deea" opacity="0.25"/>
      <text class="pill-text" x="94" y="13" dominant-baseline="central">🔮 Repos</text>
      <text class="pill-val" x="164" y="13" text-anchor="end" dominant-baseline="central">0</text>

      <rect x="176" y="0" width="84" height="26" rx="8" fill="#ce93d8" opacity="0.25"/>
      <text class="pill-text" x="182" y="13" dominant-baseline="central">🔱 Forks</text>
      <text class="pill-val" x="254" y="13" text-anchor="end" dominant-baseline="central">0</text>
    </g>

    <g transform="translate(0, 85)">
      <text class="exp-label" x="0" y="0">✨ EXP <tspan font-size="9" opacity="0.6" font-family="Outfit">(Followers)</tspan></text>
      <text class="pill-val" x="260" y="0" text-anchor="end">21</text>
      
      <rect x="0" y="8" width="260" height="10" rx="5" fill="#271c35" opacity="0.28"/>
      
      <rect x="0" y="8" width="109.2" height="10" rx="5" fill="#f48fb1" fill-opacity="0.85">
        <animate attributeName="width" from="0" to="109.2" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      </rect>
    </g>

  </g>

  <text class="footer-text" x="460" y="165" text-anchor="end">DEV FAIRY METRICS</text>
</svg>