
<svg xmlns="http://www.w3.org/2000/svg" width="495" height="280" viewBox="0 0 495 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c081a"/>
      <stop offset="100%" stop-color="#050308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#80deea" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#ce93d8" flood-opacity="0.15"/>
    </filter>
    <filter id="blur-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <clipPath id="card-clip">
      <rect width="495" height="280" rx="20"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Outfit:wght@500;700;800&amp;display=swap');
      
      .card-title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 15px;
        font-weight: 700;
        fill: #f48fb1;
        letter-spacing: 0.5px;
      }
      .stat-label {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        font-weight: 500;
        fill: #b3afc9;
      }
      .stat-value {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 15px;
        font-weight: 800;
        fill: #f48fb1;
      }
      .card-footer {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 9px;
        font-weight: 600;
        fill: #b3afc9;
        opacity: 0.5;
        letter-spacing: 1px;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .floating-icon {
        animation: float 4s ease-in-out infinite;
      }
      
      .stat-row {
        transition: transform 0.2s ease;
      }
      .stat-row:hover {
        transform: translateX(4px);
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect width="495" height="280" rx="20" fill="url(#bg)"
    stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Blurred background blobs (Clipped to card shape) -->
  <g clip-path="url(#card-clip)">
    <circle cx="465" cy="40" r="70" fill="#ce93d8" opacity="0.3" filter="url(#blur-filter)"/>
    <circle cx="30" cy="250" r="65" fill="#80deea" opacity="0.25" filter="url(#blur-filter)"/>
  </g>

  <!-- Shimmer overlay -->
  <rect width="495" height="280" rx="20" fill="url(#shimmer)" pointer-events="none"/>

  
  <!-- Title -->
  <text class="card-title" x="28" y="33">
    지아's GitHub Stats
  </text>
  <line x1="28" y1="44" x2="467" y2="44" stroke="url(#accent)" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  

  <!-- Stats Rows -->
  
  <g class="stat-row" transform="translate(28, 68)">
    <!-- Icon Container Pill/Box -->
    <rect class="floating-icon" x="0" y="0" width="32" height="32" rx="10" fill="#ff9800" opacity="0.15" style="animation-delay: 0s;"/>
    <g class="floating-icon" transform="translate(6, 6) scale(0.83)" fill="#ff9800" stroke="#ff9800" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" style="animation-delay: 0s;">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </g>
    <!-- Label -->
    <text class="stat-label" x="48" y="16" dominant-baseline="central">Total Stars</text>
    <!-- Value -->
    <text class="stat-value" x="439" y="16" text-anchor="end" dominant-baseline="central">1</text>
    <!-- Subtle separator -->
    <line x1="0" y1="39" x2="439" y2="39" stroke="#271c35" stroke-width="0.5" opacity="0.25"/>
  </g>
  <g class="stat-row" transform="translate(28, 114)">
    <!-- Icon Container Pill/Box -->
    <rect class="floating-icon" x="0" y="0" width="32" height="32" rx="10" fill="#f48fb1" opacity="0.15" style="animation-delay: 0.2s;"/>
    <g class="floating-icon" transform="translate(6, 6) scale(0.83)" fill="none" stroke="#f48fb1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" style="animation-delay: 0.2s;">
      <path d="M3 7V5a2 2 0 0 1 2-2h4l2 2h4a2 2 0 0 1 2 2v2M3 7h18M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/>
    </g>
    <!-- Label -->
    <text class="stat-label" x="48" y="16" dominant-baseline="central">Total Repos</text>
    <!-- Value -->
    <text class="stat-value" x="439" y="16" text-anchor="end" dominant-baseline="central">21</text>
    <!-- Subtle separator -->
    <line x1="0" y1="39" x2="439" y2="39" stroke="#271c35" stroke-width="0.5" opacity="0.25"/>
  </g>
  <g class="stat-row" transform="translate(28, 160)">
    <!-- Icon Container Pill/Box -->
    <rect class="floating-icon" x="0" y="0" width="32" height="32" rx="10" fill="#00B4AB" opacity="0.15" style="animation-delay: 0.4s;"/>
    <g class="floating-icon" transform="translate(6, 6) scale(0.83)" fill="none" stroke="#00B4AB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" style="animation-delay: 0.4s;">
      <path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/>
    </g>
    <!-- Label -->
    <text class="stat-label" x="48" y="16" dominant-baseline="central">Top Language</text>
    <!-- Value -->
    <text class="stat-value" x="439" y="16" text-anchor="end" dominant-baseline="central">Dart</text>
    <!-- Subtle separator -->
    <line x1="0" y1="39" x2="439" y2="39" stroke="#271c35" stroke-width="0.5" opacity="0.25"/>
  </g>
  <g class="stat-row" transform="translate(28, 206)">
    <!-- Icon Container Pill/Box -->
    <rect class="floating-icon" x="0" y="0" width="32" height="32" rx="10" fill="#80deea" opacity="0.15" style="animation-delay: 0.6000000000000001s;"/>
    <g class="floating-icon" transform="translate(6, 6) scale(0.83)" fill="none" stroke="#80deea" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" style="animation-delay: 0.6000000000000001s;">
      <path d="M6 3v6a3 3 0 0 0 6 0V3M6 3h6M9 16v-4M9 16a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
    </g>
    <!-- Label -->
    <text class="stat-label" x="48" y="16" dominant-baseline="central">Total Forks</text>
    <!-- Value -->
    <text class="stat-value" x="439" y="16" text-anchor="end" dominant-baseline="central">2</text>
    <!-- Subtle separator -->
    
  </g>

  <!-- Footer -->
  <text class="card-footer" x="475" y="268" text-anchor="end">DEV FAIRY METRICS ✨</text>
</svg>