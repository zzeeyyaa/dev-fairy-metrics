
<svg xmlns="http://www.w3.org/2000/svg" width="490" height="190" viewBox="0 0 490 190">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c081a"/>
      <stop offset="100%" stop-color="#050308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#80deea" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.02"/>
    </linearGradient>

    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blob-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <clipPath id="card-clip">
      <rect width="490" height="190" rx="20"/>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&amp;family=Outfit:wght@600;700;800;900&amp;display=swap');
      
      .title-text { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; fill: #f48fb1; letter-spacing: 1.5px; }
      .user-text { font-family: 'Outfit', sans-serif; font-size: 10.5px; font-weight: 600; fill: #b3afc9; opacity: 0.8; }
      .lang-label { font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; fill: #f48fb1; }
      .lang-pct { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 800; fill: #f48fb1; }
      .footer-text { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700; fill: #b3afc9; opacity: 0.4; letter-spacing: 2px; }
    </style>
  </defs>

// ================= BASE KARTU (CLEAN NO MELUBER) ================= -->
  <rect x="10" y="10" width="470" height="170" rx="20" fill="url(#bg)" 
    stroke="url(#accent)" stroke-width="1.2" stroke-opacity="0.6"/>

  <g clip-path="url(#card-clip)">
    <circle cx="110" cy="110" r="75" fill="#80deea" opacity="0.22" filter="url(#blob-blur)"/>
    <circle cx="370" cy="40" r="95" fill="#ce93d8" opacity="0.18" filter="url(#blob-blur)"/>
  </g>

  <rect x="10" y="10" width="470" height="170" rx="20" fill="url(#shimmer)" pointer-events="none"/>

  
  <g transform="translate(30, 32)">
    <text class="title-text" x="0" y="0">✨ MAGIC AFFINITY</text>
    <text class="user-text" x="0" y="14">Element mastery of zzeeyyaa</text>
  </g>
  

  <g transform="translate(85, 112)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#f48fb1" stroke-width="1.2" stroke-dasharray="4,5" opacity="0.5" filter="url(#glow-sm)">
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 0 0" 
        to="360 0 0" 
        dur="25s" 
        repeatCount="indefinite" 
      />
    </circle>
    
    <circle cx="0" cy="0" r="26" fill="none" stroke="#271c35" stroke-width="1.5" opacity="0.3" />
    <text x="0" y="2" font-size="20" text-anchor="middle" dominant-baseline="central" opacity="0.85">🔮</text>

    <g transform="rotate(-90)">
      
      <circle cx="0" cy="0" r="36" fill="none" stroke="#00B4AB" stroke-width="7" 
        stroke-dasharray="95.9088 226.2" 
        stroke-dashoffset="0" 
        stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-dashoffset" from="226.2" to="0" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </circle>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#DA5B0B" stroke-width="7" 
        stroke-dasharray="44.56139999999999 226.2" 
        stroke-dashoffset="-95.9088" 
        stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-dashoffset" from="226.2" to="-95.9088" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </circle>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#f7df1e" stroke-width="7" 
        stroke-dasharray="16.965 226.2" 
        stroke-dashoffset="-140.47019999999998" 
        stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-dashoffset" from="226.2" to="-140.47019999999998" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </circle>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#3178c6" stroke-width="7" 
        stroke-dasharray="16.2864 226.2" 
        stroke-dashoffset="-157.43519999999998" 
        stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-dashoffset" from="226.2" to="-157.43519999999998" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </circle>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#f34b7d" stroke-width="7" 
        stroke-dasharray="11.5362 226.2" 
        stroke-dashoffset="-173.72159999999997" 
        stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-dashoffset" from="226.2" to="-173.72159999999997" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </circle>
    </g>
  </g>

  <g transform="translate(200, 55)">
    
    <g transform="translate(0, 0)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.00s" fill="freeze"/>
      
      <circle cx="0" cy="0" r="3.5" fill="#00B4AB" opacity="0.95" />

      <text class="lang-label" x="10" y="0" dominant-baseline="central">
        DART
      </text>

      <rect x="96" y="-3.5" width="105" height="7" rx="3.5" fill="#271c35" opacity="0.18" />
      
      <rect x="96" y="-3.5" width="0" height="7" rx="3.5" fill="#00B4AB">
        <animate attributeName="width" from="0" to="44.519999999999996" dur="0.8s" begin="0.00s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>

      <circle cx="96" cy="0" r="2" fill="#ffffff" opacity="0">
        <animate attributeName="cx" from="96" to="140.51999999999998" dur="0.8s" begin="0.00s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
        <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="0.00s" fill="freeze"/>
      </circle>
      
      <text class="lang-pct" x="213" y="0" dominant-baseline="central">42.4%</text>
    </g>
    <g transform="translate(0, 23)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.08s" fill="freeze"/>
      
      <circle cx="0" cy="0" r="3.5" fill="#DA5B0B" opacity="0.95" />

      <text class="lang-label" x="10" y="0" dominant-baseline="central">
        JUPYTER N..
      </text>

      <rect x="96" y="-3.5" width="105" height="7" rx="3.5" fill="#271c35" opacity="0.18" />
      
      <rect x="96" y="-3.5" width="0" height="7" rx="3.5" fill="#DA5B0B">
        <animate attributeName="width" from="0" to="20.685" dur="0.8s" begin="0.08s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>

      <circle cx="96" cy="0" r="2" fill="#ffffff" opacity="0">
        <animate attributeName="cx" from="96" to="116.685" dur="0.8s" begin="0.08s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
        <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="0.08s" fill="freeze"/>
      </circle>
      
      <text class="lang-pct" x="213" y="0" dominant-baseline="central">19.7%</text>
    </g>
    <g transform="translate(0, 46)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.16s" fill="freeze"/>
      
      <circle cx="0" cy="0" r="3.5" fill="#f7df1e" opacity="0.95" />

      <text class="lang-label" x="10" y="0" dominant-baseline="central">
        JAVASCRIPT
      </text>

      <rect x="96" y="-3.5" width="105" height="7" rx="3.5" fill="#271c35" opacity="0.18" />
      
      <rect x="96" y="-3.5" width="0" height="7" rx="3.5" fill="#f7df1e">
        <animate attributeName="width" from="0" to="7.875" dur="0.8s" begin="0.16s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>

      <circle cx="96" cy="0" r="2" fill="#ffffff" opacity="0">
        <animate attributeName="cx" from="96" to="103.875" dur="0.8s" begin="0.16s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
        <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="0.16s" fill="freeze"/>
      </circle>
      
      <text class="lang-pct" x="213" y="0" dominant-baseline="central">7.5%</text>
    </g>
    <g transform="translate(0, 69)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.24s" fill="freeze"/>
      
      <circle cx="0" cy="0" r="3.5" fill="#3178c6" opacity="0.95" />

      <text class="lang-label" x="10" y="0" dominant-baseline="central">
        TYPESCRIPT
      </text>

      <rect x="96" y="-3.5" width="105" height="7" rx="3.5" fill="#271c35" opacity="0.18" />
      
      <rect x="96" y="-3.5" width="0" height="7" rx="3.5" fill="#3178c6">
        <animate attributeName="width" from="0" to="7.5600000000000005" dur="0.8s" begin="0.24s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>

      <circle cx="96" cy="0" r="2" fill="#ffffff" opacity="0">
        <animate attributeName="cx" from="96" to="103.56" dur="0.8s" begin="0.24s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
        <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="0.24s" fill="freeze"/>
      </circle>
      
      <text class="lang-pct" x="213" y="0" dominant-baseline="central">7.2%</text>
    </g>
    <g transform="translate(0, 92)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.32s" fill="freeze"/>
      
      <circle cx="0" cy="0" r="3.5" fill="#f34b7d" opacity="0.95" />

      <text class="lang-label" x="10" y="0" dominant-baseline="central">
        C++
      </text>

      <rect x="96" y="-3.5" width="105" height="7" rx="3.5" fill="#271c35" opacity="0.18" />
      
      <rect x="96" y="-3.5" width="0" height="7" rx="3.5" fill="#f34b7d">
        <animate attributeName="width" from="0" to="5.3549999999999995" dur="0.8s" begin="0.32s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>

      <circle cx="96" cy="0" r="2" fill="#ffffff" opacity="0">
        <animate attributeName="cx" from="96" to="101.355" dur="0.8s" begin="0.32s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
        <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="0.32s" fill="freeze"/>
      </circle>
      
      <text class="lang-pct" x="213" y="0" dominant-baseline="central">5.1%</text>
    </g>
  </g>

  <text class="footer-text" x="460" y="165" text-anchor="end">DEV FAIRY METRICS</text>
</svg>